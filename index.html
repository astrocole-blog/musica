<!DOCTYPE html>
<html lang="es">
<head>
   
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music USB</title>
   
    <meta name="theme-color" content="#121417">
   
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJkZWZhdWx0X2xvY2FsZSI6ICJlcyIsCiAgIm5hbWUiOiAiTXVzaWMgVVNCIiwKICAic2hvcnRfbmFtZSI6ICJNdXNpYyBVU0IiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzEyMTQxNyIsCiAgInRoZW1lX2NvbG9yIjogIiMxMjE0MTciCn0=">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    
    <style>
        :root { --primary: #00d2ff; --active: #ff9f43; --bg: #121417; --card: #1e2126; }
        body { 
            background: var(--bg); color: white; margin: 0;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden;
        }
        .player-card {
            width: 88%; max-width: 400px; background: var(--card);
            padding: 25px; border-radius: 45px; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7); position: relative;
        }
        .hidden { display: none !important; }

        .display-area {
            width: 100%; height: 260px; margin-bottom: 15px;
            position: relative; border-radius: 35px; overflow: hidden;
            background: #181a1f;
        }
        .album-art-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #album-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        #lyrics-panel {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 22, 26, 0.95); padding: 20px; box-sizing: border-box;
            display: none; flex-direction: column; z-index: 10;
            overflow-y: auto; text-align: left; border: 1px solid #333;
        }
        #lyrics-text { font-size: 0.9rem; line-height: 1.6; color: #eee; white-space: pre-wrap; margin: 0; }

        .track-info h2 { font-size: 1.2rem; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        .track-info p { font-size: 0.85rem; color: #88929b; margin: 5px 0 10px; }

        input[type="range"] { width: 100%; accent-color: var(--primary); margin-bottom: 10px; height: 6px; cursor: pointer; }
        .volume-container { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; opacity: 0.8; padding: 0 10px; }

        .controls-row { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 12px; }
        .btn { background: none; border: none; color: white; cursor: pointer; transition: 0.2s; padding: 10px; border-radius: 15px; }
        .btn:active { transform: scale(0.9); opacity: 0.6; }
        
        .btn-main { 
            background: var(--primary); width: 65px; height: 65px; 
            border-radius: 50%; color: #000; font-size: 1.6rem;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-nav { font-size: 2rem; }
        .btn-seek { font-size: 1.4rem; color: #777; }

        .btn-status { font-size: 1.4rem; color: #444; background: rgba(255,255,255,0.03); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }
        .btn-status.active-orange { color: var(--active); background: rgba(255, 159, 67, 0.15); border: 1px solid rgba(255, 159, 67, 0.3); }
        .btn-status.active-blue { color: var(--primary); background: rgba(0, 210, 255, 0.15); border: 1px solid rgba(0, 210, 255, 0.3); }

        .file-label { background: var(--primary); color: #000; padding: 18px 35px; border-radius: 50px; font-weight: bold; cursor: pointer; display: inline-block; }
    </style>
</head>
<body>

<div class="player-card">
    <div id="setup-screen">
        <div class="display-area"><div class="album-art-container" style="font-size: 5rem;">📂</div></div>
        <h2 style="margin-bottom: 10px;">Music USB</h2>
        <p style="color:#888; margin-bottom: 25px;">Selecciona la carpeta del USB</p>
        <label class="file-label">ABRIR CARPETA<input type="file" id="file-input" multiple webkitdirectory style="display:none"></label>
    </div>

    <div id="player-screen" class="hidden">
        <div class="display-area">
            <div id="lyrics-panel"><p id="lyrics-text"></p></div>
            <div class="album-art-container">
                <img id="album-img" src="" alt="Portada">
                <div id="placeholder" style="font-size: 6rem;">🎵</div>
            </div>
        </div>
        <div class="track-info"><h2 id="track-title">Cargando...</h2><p id="track-count">0 de 0</p></div>
        <input type="range" id="progress-bar" value="0">
        <div class="volume-container"><span>🔈</span><input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.8"><span>🔊</span></div>
        <div class="controls-row"><button class="btn btn-seek" onclick="changeTime(-10)">⏪</button><button class="btn btn-main" id="play-btn">▶</button><button class="btn btn-seek" onclick="changeTime(10)">⏩</button></div>
        <div class="controls-row"><button class="btn btn-status" id="shuffle-btn">🔀</button><button class="btn btn-nav" id="prev-btn">⏮</button><button class="btn btn-nav" id="next-btn">⏭</button><button class="btn btn-status" id="lyrics-btn" onclick="toggleLyrics()">📝</button><button class="btn btn-status" onclick="location.reload()">🔄</button></div>
    </div>
</div>

<audio id="audio-player"></audio>

<script>
    // Registro de Service Worker para que Android lo detecte como App
    if ('serviceWorker' in navigator) {
        const sw = 'data:text/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIGU9PmV2ZW50LnJlc3BvbmRXaXRoKGZldGNoKGUucmVxdWVzdCkpKTs=';
        navigator.serviceWorker.register(sw);
    }

    const jsmediatags = window.jsmediatags;
    const audio = document.getElementById('audio-player');
    const fileInput = document.getElementById('file-input');
    const playBtn = document.getElementById('play-btn');
    const shuffleBtn = document.getElementById('shuffle-btn');
    const lyricsBtn = document.getElementById('lyrics-btn');
    const lyricsPanel = document.getElementById('lyrics-panel');
    const lyricsText = document.getElementById('lyrics-text');
    
    let playlist = [];
    let currentIndex = 0;
    let isShuffle = false;

    fileInput.onchange = (e) => {
        playlist = Array.from(e.target.files).filter(f => f.type.startsWith('audio/'));
        if (playlist.length > 0) {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('player-screen').classList.remove('hidden');
            loadTrack(0);
        }
    };

    function loadTrack(index) {
        currentIndex = index;
        const file = playlist[index];
        audio.src = URL.createObjectURL(file);
        const songTitle = file.name.replace(/\.[^/.]+$/, "");
        document.getElementById('track-title').innerText = songTitle;
        document.getElementById('track-count').innerText = `${index + 1} / ${playlist.length}`;
        
        document.getElementById('album-img').style.display = 'none';
        document.getElementById('placeholder').style.display = 'block';
        
        jsmediatags.read(file, {
            onSuccess: function(tag) {
                let imgUrl = "";
                const pic = tag.tags.picture;
                if (pic) {
                    let base64 = "";
                    for (let i = 0; i < pic.data.length; i++) base64 += String.fromCharCode(pic.data[i]);
                    imgUrl = `data:${pic.format};base64,${window.btoa(base64)}`;
                    document.getElementById('album-img').src = imgUrl;
                    document.getElementById('album-img').style.display = 'block';
                    document.getElementById('placeholder').style.display = 'none';
                }
                const lyrics = tag.tags.lyrics || tag.tags.unsynchronisedLyrics || tag.tags.USLT;
                lyricsText.innerText = lyrics ? (lyrics.lyrics || lyrics) : "Sin letras.";
                updateMediaSession(songTitle, imgUrl);
            }
        });
        audio.play();
        playBtn.innerText = '⏸';
    }

    function updateMediaSession(title, img) {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: title,
                artist: 'Music USB',
                artwork: [{ src: img || '', sizes: '512x512', type: 'image/png' }]
            });
            navigator.mediaSession.setActionHandler('play', () => audio.play());
            navigator.mediaSession.setActionHandler('pause', () => audio.pause());
            navigator.mediaSession.setActionHandler('previoustrack', () => document.getElementById('prev-btn').click());
            navigator.mediaSession.setActionHandler('nexttrack', () => document.getElementById('next-btn').click());
        }
    }

    function toggleLyrics() {
        const isVisible = lyricsPanel.style.display === 'block';
        lyricsPanel.style.display = isVisible ? 'none' : 'block';
        lyricsBtn.classList.toggle('active-blue', !isVisible);
    }

    shuffleBtn.onclick = function() { isShuffle = !isShuffle; this.classList.toggle('active-orange', isShuffle); };
    playBtn.onclick = () => { if (audio.paused) audio.play(); else audio.pause(); };
    audio.onplay = () => { playBtn.innerText = '⏸'; if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "playing"; };
    audio.onpause = () => { playBtn.innerText = '▶'; if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "paused"; };

    document.getElementById('next-btn').onclick = () => {
        let idx = isShuffle ? Math.floor(Math.random() * playlist.length) : (currentIndex + 1) % playlist.length;
        loadTrack(idx);
    };

    document.getElementById('prev-btn').onclick = () => loadTrack((currentIndex - 1 + playlist.length) % playlist.length);
    function changeTime(s) { audio.currentTime += s; }
    document.getElementById('volume-slider').oninput = (e) => audio.volume = e.target.value;
    audio.ontimeupdate = () => document.getElementById('progress-bar').value = (audio.currentTime / audio.duration) * 100 || 0;
    document.getElementById('progress-bar').oninput = function() { audio.currentTime = (this.value * audio.duration) / 100; };
    audio.onended = () => document.getElementById('next-btn').click();
</script>
</body>
</html>
