<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music Player Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    
    <style>
        :root { --primary: #00d2ff; --active: #ff9f43; --bg: #121417; --card: #1e2126; }
        body { 
            background: var(--bg); color: white; margin: 0;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden;
        }
        .player-card {
            width: 85%; max-width: 380px; background: var(--card);
            padding: 25px; border-radius: 40px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); position: relative;
        }
        .hidden { display: none !important; }

        /* Contenedor Superior (Carátula o Letras) */
        .display-area {
            width: 100%; height: 260px; margin-bottom: 15px;
            position: relative; border-radius: 30px; overflow: hidden;
        }

        .album-art-container {
            width: 100%; height: 100%; background: #23272e;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        #album-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        /* Panel de Letras integrado en el área visual */
        #lyrics-panel {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #181a1f; padding: 20px; box-sizing: border-box;
            display: none; flex-direction: column; z-index: 5;
            overflow-y: auto; text-align: left;
            border: 1px solid #333; border-radius: 30px;
        }
        #lyrics-text { font-size: 0.85rem; line-height: 1.5; color: #ccc; white-space: pre-wrap; margin: 0; }

        .track-info h2 { font-size: 1.1rem; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-info p { font-size: 0.8rem; color: #88929b; margin: 5px 0 10px; }

        input[type="range"] { width: 100%; accent-color: var(--primary); margin-bottom: 8px; height: 6px; cursor: pointer; }

        .volume-container { display: flex; align-items: center; gap: 8px; margin-bottom: 15px; opacity: 0.7; }

        .controls-row { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 10px; }
        .btn { background: none; border: none; color: white; cursor: pointer; transition: 0.2s; padding: 10px; border-radius: 12px; }
        .btn:active { transform: scale(0.9); }
        
        .btn-main { 
            background: var(--primary); width: 55px; height: 55px; 
            border-radius: 50%; color: #000; font-size: 1.4rem;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-nav { font-size: 1.7rem; }
        .btn-seek { font-size: 1.3rem; color: #888; }

        /* Botones de Función (Shuffle / Lyrics / Reset) */
        .btn-status { font-size: 1.3rem; color: #444; background: rgba(255,255,255,0.03); width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; }
        .btn-status.active-orange { color: var(--active); background: rgba(255, 159, 67, 0.1); border: 1px solid rgba(255, 159, 67, 0.2); }
        .btn-status.active-blue { color: var(--primary); background: rgba(0, 210, 255, 0.1); border: 1px solid rgba(0, 210, 255, 0.2); }

        .file-label { background: var(--primary); color: #000; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="player-card">
    <div id="setup-screen">
        <div class="display-area"><div class="album-art-container" style="font-size: 5rem;">📂</div></div>
        <label class="file-label">CARGAR CARPETA<input type="file" id="file-input" multiple webkitdirectory style="display:none"></label>
    </div>

    <div id="player-screen" class="hidden">
        <div class="display-area">
            <div id="lyrics-panel"><p id="lyrics-text"></p></div>
            <div class="album-art-container">
                <img id="album-img" src="" alt="Portada">
                <div id="placeholder" style="font-size: 5rem;">🎵</div>
            </div>
        </div>

        <div class="track-info"><h2 id="track-title">Título</h2><p id="track-count">0 / 0</p></div>

        <input type="range" id="progress-bar" value="0">

        <div class="volume-container">
            <span style="font-size:0.8rem">🔈</span>
            <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.8">
            <span style="font-size:0.8rem">🔊</span>
        </div>

        <div class="controls-row">
            <button class="btn btn-seek" onclick="changeTime(-10)">⏪</button>
            <button class="btn btn-main" id="play-btn">▶</button>
            <button class="btn btn-seek" onclick="changeTime(10)">⏩</button>
        </div>

        <div class="controls-row">
            <button class="btn btn-status" id="shuffle-btn" title="Aleatorio">🔀</button>
            <button class="btn btn-nav" id="prev-btn">⏮</button>
            <button class="btn btn-nav" id="next-btn">⏭</button>
            <button class="btn btn-status" id="lyrics-btn" onclick="toggleLyrics()">📝</button>
            <button class="btn btn-status" onclick="location.reload()" title="Reset">🔄</button>
        </div>
    </div>
</div>

<audio id="audio-player"></audio>

<script>
    const jsmediatags = window.jsmediatags;
    const audio = document.getElementById('audio-player');
    const fileInput = document.getElementById('file-input');
    const playBtn = document.getElementById('play-btn');
    const shuffleBtn = document.getElementById('shuffle-btn');
    const lyricsBtn = document.getElementById('lyrics-btn');
    const lyricsPanel = document.getElementById('lyrics-panel');
    const lyricsText = document.getElementById('lyrics-text');
    
    let playlist = [];
    let currentIndex = 0;
    let isShuffle = false;

    fileInput.onchange = (e) => {
        playlist = Array.from(e.target.files).filter(f => f.type.startsWith('audio/'));
        if (playlist.length > 0) {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('player-screen').classList.remove('hidden');
            loadTrack(0);
        }
    };

    function loadTrack(index) {
        currentIndex = index;
        const file = playlist[index];
        audio.src = URL.createObjectURL(file);
        document.getElementById('track-title').innerText = file.name.replace(/\.[^/.]+$/, "");
        document.getElementById('track-count').innerText = `${index + 1} de ${playlist.length}`;
        
        document.getElementById('album-img').style.display = 'none';
        document.getElementById('placeholder').style.display = 'block';
        lyricsText.innerText = "No hay letras incrustadas en este archivo.";
        
        jsmediatags.read(file, {
            onSuccess: function(tag) {
                const pic = tag.tags.picture;
                if (pic) {
                    let base64 = "";
                    for (let i = 0; i < pic.data.length; i++) base64 += String.fromCharCode(pic.data[i]);
                    document.getElementById('album-img').src = `data:${pic.format};base64,${window.btoa(base64)}`;
                    document.getElementById('album-img').style.display = 'block';
                    document.getElementById('placeholder').style.display = 'none';
                }
                const lyrics = tag.tags.lyrics || tag.tags.unsynchronisedLyrics || tag.tags.USLT;
                if (lyrics) lyricsText.innerText = lyrics.lyrics || lyrics;
            }
        });
        audio.play();
        playBtn.innerText = '⏸';
    }

    function toggleLyrics() {
        const isVisible = lyricsPanel.style.display === 'block';
        lyricsPanel.style.display = isVisible ? 'none' : 'block';
        lyricsBtn.classList.toggle('active-blue', !isVisible);
    }

    shuffleBtn.onclick = function() {
        isShuffle = !isShuffle;
        this.classList.toggle('active-orange', isShuffle);
    };

    playBtn.onclick = () => {
        if (audio.paused) { audio.play(); playBtn.innerText = '⏸'; }
        else { audio.pause(); playBtn.innerText = '▶'; }
    };

    document.getElementById('next-btn').onclick = () => {
        let idx = isShuffle ? Math.floor(Math.random() * playlist.length) : (currentIndex + 1) % playlist.length;
        loadTrack(idx);
    };

    document.getElementById('prev-btn').onclick = () => loadTrack((currentIndex - 1 + playlist.length) % playlist.length);
    
    function changeTime(s) { audio.currentTime += s; }
    document.getElementById('volume-slider').oninput = (e) => audio.volume = e.target.value;
    audio.ontimeupdate = () => document.getElementById('progress-bar').value = (audio.currentTime / audio.duration) * 100 || 0;
    document.getElementById('progress-bar').oninput = function() { audio.currentTime = (this.value * audio.duration) / 100; };
    audio.onended = () => document.getElementById('next-btn').click();
</script>
</body>
</html>
